name: CI Pipeline

on:
  push:
    branches: [ main, master, dev, staging ]
  pull_request:
    branches: [ main, master, dev, staging ]

jobs:
  backend-test:
    name: Backend Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint with Flake8/Black
        run: |
          # Placeholder for code formatting and lint checks
          echo "Running backend style checks..."

      - name: Run Backend Tests
        run: |
          # pytest backend/app/tests/
          echo "Running backend test suite..."

  frontend-test:
    name: Frontend Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci || npm install

      - name: Lint and Format Checks
        run: |
          cd frontend
          # npm run lint
          echo "Running frontend style checks..."

      - name: Run Frontend Tests
        run: |
          cd frontend
          # npm run test
          echo "Running frontend test suite..."
